# 小说子应用本地 Docker（app_key=novel）
# 启动：ams-novel local  或  cd apps/novel/deploy && docker compose --profile novel up -d --build

name: ams-novel

include:
  - path: ../../../deploy/compose/infra.yml
    env_file: ./config/.env.local

services:
  api-novel:
    profiles: ["novel"]
    build:
      context: ..
      dockerfile: deploy/config/Dockerfile.backend
    container_name: ams-api-novel
    restart: unless-stopped
    env_file:
      - ./config/.env.local
    environment:
      APP_KEY: novel
      POSTGRES_HOST: postgres
      PORT: ${NOVEL_PORT:-7002}
      POSTGRES_DB: ${NOVEL_POSTGRES_DB:-novel_db}
    ports:
      - "${NOVEL_PORT:-7002}:${NOVEL_PORT:-7002}"
    depends_on:
      postgres:
        condition: service_healthy

  novel-frontend:
    profiles: ["novel"]
    build:
      context: ..
      dockerfile: deploy/config/Dockerfile.frontend
    container_name: ams-novel-frontend
    restart: unless-stopped
    ports:
      - "${NOVEL_FRONTEND_PORT:-8081}:80"
    depends_on:
      - api-novel
