# Agent 本地 Docker（app_key=agent）
# 启动：ams-agent local  或  cd apps/agent-server/deploy && docker compose --profile agent up -d --build
# 配置：deploy/config/.env.local + src/.env（实现后）

name: ams-agent

include:
  - path: ../../../deploy/compose/infra.yml
    env_file: ./config/.env.local

services:
  agent-server:
    profiles: ["agent"]
    build:
      context: ..
      dockerfile: deploy/config/Dockerfile
    container_name: ams-agent-server
    restart: unless-stopped
    env_file:
      - ./config/.env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-admin_platform}
      PORT: ${AGENT_PORT:-7003}
    ports:
      - "${AGENT_PORT:-7003}:${AGENT_PORT:-7003}"
    depends_on:
      postgres:
        condition: service_healthy
