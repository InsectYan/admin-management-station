# Agent 服务片段（app_key=agent）
# 代码目录：apps/agent-server（待实现）
# 启用：ams local:agent  或  cd apps/agent-server && docker compose --profile agent up -d

services:
  agent-server:
    profiles: ["agent"]
    build:
      context: ../..
      dockerfile: deploy/config/Dockerfile.agent
    container_name: ams-agent-server
    restart: unless-stopped
    env_file:
      - ../../deploy/config/.env.local
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-admin_platform}
      PORT: ${AGENT_PORT:-7003}
    ports:
      - "${AGENT_PORT:-7003}:${AGENT_PORT:-7003}"
    depends_on:
      postgres:
        condition: service_healthy
