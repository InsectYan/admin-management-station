# 共享基础设施：PostgreSQL + Redis + 网络 ams-net
#
# ⚠️ 已废弃 — 各应用 deploy/docker-compose.yml 自管 Postgres/Redis。
# 见 .cursor/rules/app-self-contained.mdc 与 deploy/README.md
#
# 勿在新 compose 中 include 本文件。

services:
  postgres:
    image: postgres:16-alpine
    container_name: ams-postgres-deprecated
    profiles: ["deprecated"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-admin_platform}
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: ams-redis-deprecated
    profiles: ["deprecated"]
    ports:
      - "6379:6379"
