# 全栈编排入口（include 各应用服务片段）
# 启动：ams local  或  docker compose -f deploy/docker-compose.yml up -d --build
# 配置：deploy/config/.env.local + 各应用 .env

name: ams

include:
  - path: ./compose/infra.yml
    env_file: ./config/.env.local
  - path: ../menu-master/docker-compose.services.yml
  - path: ../apps/novel/docker-compose.services.yml
  - path: ../apps/agent-server/docker-compose.services.yml
