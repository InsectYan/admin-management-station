# 主应用服务片段（app_key=main）
# 由 menu-master/docker-compose.yml 或 deploy/docker-compose.yml include

services:
  api-main:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ams-api-main
    restart: unless-stopped
    env_file:
      - ../deploy/config/.env.local
    environment:
      APP_KEY: main
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      PORT: ${MAIN_PORT:-7001}
      POSTGRES_DB: ${MAIN_POSTGRES_DB:-admin_platform}
    ports:
      - "${MAIN_PORT:-7001}:${MAIN_PORT:-7001}"
    depends_on:
      postgres:
        condition: service_healthy

  main-frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE: /api
        VITE_APP_KEY: main
    container_name: ams-main-frontend
    restart: unless-stopped
    ports:
      - "${MAIN_FRONTEND_PORT:-8080}:80"
    depends_on:
      - api-main
