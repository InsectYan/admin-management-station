# 主应用本地 Docker — 自包含栈（Postgres + API + 前端）
# 启动：ams-main local（会先扫描 project-sub/ 同步子应用菜单）

name: ams-main

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: ams-main-postgres
    restart: unless-stopped
    env_file:
      - ./config/.env.local
    environment:
      POSTGRES_DB: ${MAIN_POSTGRES_DB:-admin_platform}
    ports:
      - "${MAIN_POSTGRES_PORT:-5300}:5432"
    volumes:
      - main_pgdata:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${MAIN_POSTGRES_DB:-admin_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-main:
    build:
      context: ..
      dockerfile: deploy/config/Dockerfile
    container_name: ams-api-main
    restart: unless-stopped
    env_file:
      - ./config/.env.local
      - ../backend/.env
    environment:
      APP_KEY: main
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      CACHE_DRIVER: memory
      PORT: ${MAIN_PORT:-5200}
      POSTGRES_DB: ${MAIN_POSTGRES_DB:-admin_platform}
      SUBAPP_NOVEL_ENTRY: ${SUBAPP_NOVEL_ENTRY:-http://localhost:5101}
      SUBAPP_TESTGEN_ENTRY: ${SUBAPP_TESTGEN_ENTRY:-http://localhost:5102}
      AGENT_PLATFORM_URL: ${AGENT_PLATFORM_URL:-http://host.docker.internal:4001}
    ports:
      - "${MAIN_PORT:-5200}:${MAIN_PORT:-5200}"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  main-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ams-main-frontend
    restart: unless-stopped
    ports:
      - "${MAIN_VITE_PORT:-5100}:5100"
    env_file:
      - ../frontend/.env.local
    environment:
      VITE_SUBAPP_NOVEL_ENTRY: ${SUBAPP_NOVEL_ENTRY:-http://localhost:5101}
      VITE_SUBAPP_TESTGEN_ENTRY: ${SUBAPP_TESTGEN_ENTRY:-http://localhost:5102}
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.js:/app/vite.config.js
    depends_on:
      api-main:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: ams-main-net

volumes:
  main_pgdata:
