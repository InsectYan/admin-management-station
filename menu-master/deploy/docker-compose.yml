# 主应用本地 Docker：共享 infra + API + 前端（Vite dev，对齐 cartoon-agent）
# 启动：ams-main local
# 配置：deploy/config/.env.local + backend/.env + frontend/.env.local

name: ams-main

include:
  - path: ../../deploy/compose/infra.yml
    env_file: ./config/.env.local

services:
  api-main:
    build:
      context: ..
      dockerfile: deploy/config/Dockerfile
    container_name: ams-api-main
    restart: unless-stopped
    env_file:
      - ./config/.env.local
      - ../backend/.env
    environment:
      APP_KEY: main
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      PORT: ${MAIN_PORT:-7001}
      POSTGRES_DB: ${MAIN_POSTGRES_DB:-admin_platform}
    ports:
      - "${MAIN_PORT:-7001}:${MAIN_PORT:-7001}"
    depends_on:
      postgres:
        condition: service_healthy

  main-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: ams-main-frontend
    restart: unless-stopped
    ports:
      - "${MAIN_VITE_PORT:-5173}:5173"
    env_file:
      - ../frontend/.env.local
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.js:/app/vite.config.js
    depends_on:
      api-main:
        condition: service_started
