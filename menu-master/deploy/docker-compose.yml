# 主应用本地 Docker — 自包含栈（Postgres + API + 前端）

# 启动：ams-main local

# 缓存默认进程内 memory，无需 Redis 容器（见 cache-local.mdc）



name: ams-main



services:

  postgres:

    image: ${POSTGRES_IMAGE:-postgres:16-alpine}

    container_name: ams-main-postgres

    restart: unless-stopped

    env_file:

      - ./config/.env.local

    environment:

      POSTGRES_DB: ${MAIN_POSTGRES_DB:-admin_platform}

    ports:

      - "${MAIN_POSTGRES_PORT:-5432}:5432"

    volumes:

      - main_pgdata:/var/lib/postgresql/data

      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

    healthcheck:

      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${MAIN_POSTGRES_DB:-admin_platform}"]

      interval: 5s

      timeout: 5s

      retries: 5



  api-main:

    build:

      context: ..

      dockerfile: deploy/config/Dockerfile

    container_name: ams-api-main

    restart: unless-stopped

    env_file:

      - ./config/.env.local

      - ../backend/.env

    environment:

      APP_KEY: main

      POSTGRES_HOST: postgres

      CACHE_DRIVER: memory

      PORT: ${MAIN_PORT:-7001}

      POSTGRES_DB: ${MAIN_POSTGRES_DB:-admin_platform}

      SUBAPP_NOVEL_ENTRY: ${SUBAPP_NOVEL_ENTRY:-http://localhost:5174}

    ports:

      - "${MAIN_PORT:-7001}:${MAIN_PORT:-7001}"

    depends_on:

      postgres:

        condition: service_healthy

    extra_hosts:

      - "host.docker.internal:host-gateway"



  main-frontend:

    build:

      context: ../frontend

      dockerfile: Dockerfile

    container_name: ams-main-frontend

    restart: unless-stopped

    ports:

      - "${MAIN_VITE_PORT:-5173}:5173"

    env_file:

      - ../frontend/.env.local

    environment:

      VITE_SUBAPP_NOVEL_ENTRY: ${SUBAPP_NOVEL_ENTRY:-http://localhost:5174}

    volumes:

      - ../frontend/src:/app/src

      - ../frontend/public:/app/public

      - ../frontend/index.html:/app/index.html

      - ../frontend/vite.config.js:/app/vite.config.js

    depends_on:

      api-main:

        condition: service_started

    extra_hosts:

      - "host.docker.internal:host-gateway"



networks:

  default:

    name: ams-main-net



volumes:

  main_pgdata:

